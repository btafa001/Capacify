# Capacify CI — everything here has to pass on LINUX, which is the point.
# The app was only ever built on a Windows laptop, where a case-mismatched
# import ('../../profile/...' against a directory tracked as 'Profile/') and a
# source file that was never `git add`ed both compile happily. Neither does
# here.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Analyze, test, build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cheap and first: a case/tracking problem makes every later step's
      # failure harder to read than this check's message.
      - name: Imports resolve case-sensitively and are tracked
        run: node tool/check_import_case.js

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      # --no-fatal-infos: the tree currently carries ~337 infos (mostly
      # withOpacity deprecations). Warnings and errors DO fail the build, so
      # this stays honest without a 337-item cleanup blocking the pipeline.
      # Drop the flag once those are worked through.
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test

      # The actual deploy artifact (firebase.json Hosting serves build/web).
      - name: flutter build web
        run: flutter build web --release

  firestore-rules:
    name: firestore.rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: firestore-tests/package-lock.json

      # The Firestore emulator is a Java process.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install the Firebase CLI
        run: npm install -g firebase-tools@15

      - name: Install test deps
        working-directory: firestore-tests
        run: npm ci

      # Boots the emulator, loads firestore.rules into it, runs the suite,
      # tears it down. No credentials and no network project — the demo-
      # prefixed project id keeps everything local.
      - name: Run rules tests
        working-directory: firestore-tests
        run: npm run test:emulator

  functions:
    name: Cloud Functions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # matches functions/package.json engines
      - name: Install
        working-directory: functions
        run: npm install
      - name: Syntax check
        working-directory: functions
        run: node --check index.js
