name: capacify
description: B2B platform for the construction industry
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.0
  web: ^1.1.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_analytics: ^12.4.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI Utilities
  google_fonts: ^6.2.1
  font_awesome_flutter: ^11.0.0
  firebase_app_check: ^0.4.5
  cloud_functions: ^6.3.3
  firebase_messaging: ^16.4.1
  image_picker: ^1.2.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true